name: Sync, Build and Publish from upstream release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"
  issues:
    types:
      - opened

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  sync-build-publish:
    if: >
      github.event_name != 'issues' ||
      (
        contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association) &&
        contains(github.event.issue.labels.*.name, 'trigger-agent')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      release_tag: ${{ steps.release.outputs.tag }}
      already_on_pypi: ${{ steps.pypi.outputs.exists }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Fetch latest upstream release metadata
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const release = await github.rest.repos.getLatestRelease({
              owner: 'github',
              repo: 'spec-kit'
            });
            core.setOutput('tag', release.data.tag_name);
            core.setOutput('tarball_url', release.data.tarball_url);

      - name: Check if release version already exists on PyPI
        id: pypi
        shell: bash
        env:
          PACKAGE_NAME: spec-kit-redist
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          PYPI_URL="https://pypi.org/pypi/${PACKAGE_NAME}/json"

          if curl -fsSL "$PYPI_URL" -o /tmp/pypi-package.json; then
            EXISTS=$(python - "$VERSION" <<'PY'
            from __future__ import annotations

            import json
            import sys

            version = sys.argv[1]
            with open("/tmp/pypi-package.json", "r", encoding="utf-8") as f:
                data = json.load(f)

            print("true" if version in data.get("releases", {}) else "false")
            PY
            )
            echo "exists=$EXISTS" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download and extract release source
        id: prepare
        if: steps.pypi.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p work
          curl -fsSL "${{ steps.release.outputs.tarball_url }}" -o work/release.tar.gz
          tar -xzf work/release.tar.gz -C work
          SRC_DIR="$(find work -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          echo "source_dir=$SRC_DIR" >> "$GITHUB_OUTPUT"

      - name: Merge pyproject override
        if: steps.pypi.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --no-cache-dir tomli-w
          python - <<'PY'
          from __future__ import annotations

          from pathlib import Path
          import os
          import tomllib
          import tomli_w

          override_path = Path(os.environ["OVERRIDE_PATH"])
          pyproject_path = Path(os.environ["PYPROJECT"])

          override_data = tomllib.loads(override_path.read_text(encoding="utf-8"))
          pyproject_data = tomllib.loads(pyproject_path.read_text(encoding="utf-8"))

          def merge_dicts(base: dict, override: dict) -> dict:
              merged = dict(base)
              for key, value in override.items():
                  if (
                      key in merged
                      and isinstance(merged[key], dict)
                      and isinstance(value, dict)
                  ):
                      merged[key] = merge_dicts(merged[key], value)
                  else:
                      merged[key] = value
              return merged

          merged = merge_dicts(pyproject_data, override_data)
          pyproject_path.write_text(tomli_w.dumps(merged), encoding="utf-8")
          PY
        env:
          OVERRIDE_PATH: ${{ github.workspace }}/pyproject-override.toml
          PYPROJECT: ${{ steps.prepare.outputs.source_dir }}/pyproject.toml

      - name: Sync dependencies with uv
        if: steps.pypi.outputs.exists != 'true'
        working-directory: ${{ steps.prepare.outputs.source_dir }}
        run: uv sync

      - name: Build package with uv
        if: steps.pypi.outputs.exists != 'true'
        working-directory: ${{ steps.prepare.outputs.source_dir }}
        run: uv build

      - name: Gerar Atestado de Procedência
        if: steps.pypi.outputs.exists != 'true'
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ${{ steps.prepare.outputs.source_dir }}/dist/*

      - name: Publish package to PyPI
        if: steps.pypi.outputs.exists != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ steps.prepare.outputs.source_dir }}/dist

  issue-close-and-comment:
    if: >
      always() &&
      github.event_name == 'issues' &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association) &&
      contains(github.event.issue.labels.*.name, 'trigger-agent')
    needs: sync-build-publish
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Comment on issue and close it
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RESULT: ${{ needs.sync-build-publish.result }}
          RELEASE_TAG: ${{ needs.sync-build-publish.outputs.release_tag }}
          ALREADY_ON_PYPI: ${{ needs.sync-build-publish.outputs.already_on_pypi }}
        run: |
          set -euo pipefail

          if [ "${ALREADY_ON_PYPI:-false}" = "true" ]; then
            STATUS="JÁ PUBLICADO NO PYPI"
            ICON="ℹ️"
            BODY=$(printf '%s\n\nRelease upstream: %s\nRun: %s\nResultado do job: %s\n' \
              "$ICON A versão **${RELEASE_TAG#v}** já estava publicada no PyPI. Workflow encerrado sem publicar novamente." \
              "${RELEASE_TAG:-não informada}" \
              "$RUN_URL" \
              "$RESULT")
          elif [ "$RESULT" = "success" ]; then
            STATUS="SUCESSO"
            ICON="✅"
            BODY=$(printf '%s\n\nRun: %s\nResultado do job: %s\n' \
              "$ICON A execução terminou com **$STATUS**." \
              "$RUN_URL" \
              "$RESULT")
          else
            STATUS="FALHOU"
            ICON="❌"
            BODY=$(printf '%s\n\nRun: %s\nResultado do job: %s\n' \
              "$ICON A execução terminou com **$STATUS**." \
              "$RUN_URL" \
              "$RESULT")
          fi

          gh issue comment "$ISSUE_NUMBER" --body "$BODY"

          gh issue close "$ISSUE_NUMBER"
